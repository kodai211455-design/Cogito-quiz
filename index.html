<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cogito Study v0.1</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>📚 Cogito Study</h1>
    <p>Ver.0.1</p>
</header>

<main>

    <!-- ホーム画面 -->
    <section id="home">

        <h2>単語帳一覧</h2>

        <button id="newNotebookBtn">
            ＋ 新しい範囲を作る
        </button>

        <div id="notebookList">

            <!-- JavaScriptで追加 -->

        </div>

    </section>


    <!-- 編集画面 -->
    <section id="editor" style="display:none;">

        <button id="backButton">
            ← ホームへ戻る
        </button>

        <h2>範囲編集</h2>

        <label>
            範囲名
        </label>

        <input
            type="text"
            id="notebookTitle"
            placeholder="例：Lesson5"
        >

        <hr>

        <h3>単語（一括入力）</h3>

        <p>
            1行につき
            <br>
            英語,日本語
        </p>

        <textarea
            id="wordInput"
            rows="10"
            placeholder="apple,りんご
book,本
school,学校">
        </textarea>

        <button id="importWordsBtn">
            単語を読み込む
        </button>

        <div id="wordPreview">

        </div>

        <hr>

        <h3>文章</h3>

        <div id="sentenceList">

        </div>

        <button id="addSentenceBtn">
            ＋文章を追加
        </button>

        <hr>

        <button id="saveNotebookBtn">
            💾 保存
        </button>

        <button id="deleteNotebookBtn">
            🗑 この範囲を削除
        </button>

    </section>

</main>

<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/editor.js"></script>

</body>
</html>
