<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cogito Study v0.1</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>📚 Cogito Study</h1>
    <p>Ver.0.2</p>
</header>

<main>

    <!-- ホーム画面 -->
    <section id="home">

        <h2>単語帳一覧</h2>

        <button id="newNotebookBtn">
            ＋ 新しい範囲を作る
        </button>

        <div id="notebookList">

            <!-- JavaScriptで追加 -->

        </div>

    </section>


    <!-- 編集画面 -->
    <section id="editor" style="display:none;">

        <button id="backButton">
            ← ホームへ戻る
        </button>

        <h2>範囲編集</h2>

        <label>
            範囲名
        </label>

        <input
            type="text"
            id="notebookTitle"
            placeholder="例：Lesson5"
        >

        <hr>

        <h3>単語（一括入力）</h3>

        <p>
            1行につき
            <br>
            英語,日本語
        </p>

        <textarea
            id="wordInput"
            rows="10"
            placeholder="apple,りんご
book,本
school,学校">
        </textarea>

        <button id="importWordsBtn">
            単語を読み込む
        </button>

        <div id="wordPreview">

        </div>

        <hr>

       <h3>文章（一括入力）</h3>

<p>
1行につき
<br>
英語,日本語
</p>

<textarea
    id="sentenceInput"
    rows="8"
    placeholder="I play soccer every day.,私は毎日サッカーをします。
This is my pen.,これは私のペンです。">
</textarea>

<button id="importSentencesBtn">
    文章を読み込む
</button>

<div id="sentencePreview"></div> 

        <hr>

        <button id="saveNotebookBtn">
    💾 保存
</button>

<button id="startQuizBtn">
    ▶ テスト開始
</button>

<button id="deleteNotebookBtn">
    🗑 この範囲を削除
</button>

    </section>
<!-- テスト画面 -->
<section id="quiz" style="display:none;">

    <button id="backToEditorBtn">
        ← 編集画面へ戻る
    </button>

    <h2>単語テスト</h2>

    <p id="quizProgress">
        問題 1 / 20
    </p>

    <h3 id="quizQuestion">
        問題が表示されます
    </h3>

    <input
        type="text"
        id="quizAnswer"
        placeholder="答えを入力">

    <button id="checkAnswerBtn">
        答え合わせ
    </button>

    <p id="quizResult"></p>

    <button id="nextQuestionBtn" style="display:none;">
        次の問題
    </button>

</section>
</main>
<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/editor.js"></script>
<script src="js/quiz.js"></script>

</body>
</html>
